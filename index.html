<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DILLU BHAI VIP</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 330px;
      padding: 25px;
      text-align: center;
      border-radius: 20px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 20px;
      background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet, red);
      background-size: 400%;
      animation: borderMove 6s linear infinite;
      z-index: -1;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 3px;
      background: #e6ddc6;
      border-radius: 18px;
      z-index: -1;
    }

    @keyframes borderMove {
      0% { background-position: 0% }
      100% { background-position: 400% }
    }

    .logo {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      animation: zoom 2s infinite alternate;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    @keyframes zoom {
      from { transform: scale(1); }
      to { transform: scale(1.12); }
    }

    h2 {
      color: #0b2a5b;
      margin: 10px 0;
      font-size: 24px;
    }

    .subs {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .text {
      font-weight: bold;
      color: #0b2a5b;
      margin-bottom: 15px;
    }

    .countdown {
      background: #ff004c;
      color: white;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
      font-weight: bold;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #1da1f2;
      color: white;
      padding: 14px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      animation: pulse 1.5s infinite;
      transition: 0.3s;
    }

    .btn img {
      width: 22px;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .btn:hover {
      transform: scale(1.15);
      box-shadow: 0 0 20px #1da1f2;
    }

    .footer {
      margin-top: 15px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="card">
  <img src="https://raw.githubusercontent.com/DillubhaiMatka/Dillu-bhai-2/main/IMG_20260723_183859_045.jpg" class="logo">
  <h2>Dillu Bhai Vip</h2>
  
  <div class="subs">
    <span id="counter">30000</span> Subscribers
  </div>
  
  <div class="text">
    All Game VIP Charts Available Here
  </div>
  
  <div class="countdown" id="timer">
    Free Joining Ends In 15 Seconds
  </div>
  
  <a href="https://t.me/+HBzm1B2SKL0zYjhl" class="btn" id="telegramBtn">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
    JOIN FREE TELEGRAM
  </a>
  
  <div class="footer">
    SIRF 3 DIN HAMARE SATH KAAM KARKE DEKHO
  </div>
</div>

<script>
  // Subscriber Counter
  let count = 30000;
  setInterval(() => {
    count += Math.floor(Math.random() * 3);
    document.getElementById("counter").innerText = count;
  }, 1800);

  // 15 Second Countdown + Auto Open Telegram
  let timeLeft = 15;
  const timerEl = document.getElementById("timer");
  const tgLink = "https://t.me/+HBzm1B2SKL0zYjhl";

  const countdown = setInterval(() => {
    timeLeft--;
    timerEl.innerText = Free Joining Ends In ${timeLeft} Seconds;

    if (timeLeft <= 0) {
      clearInterval(countdown);
      timerEl.innerText = "Hurry Up! Opening Telegram... 🚀";
      
      // Auto open Telegram
      setTimeout(() => {
        window.open(tgLink, '_blank');
      }, 800);
    }
  }, 1000);
</script>

</body>
</html>
